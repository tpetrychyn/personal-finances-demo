<!--
  Personal Finance Planner — single offline app, no build step, no frameworks.
  This file is a THIN LAUNCHER: it pulls in the stylesheet and the js/ modules, which
  share ONE global scope and hold ALL logic AND markup (js/layout.js builds the page).
    layout -> state -> util -> simulate -> header -> sankey -> gantt -> debts -> projection -> freedom -> render -> setup -> main
  Load order matters: layout.js runs FIRST (builds the DOM), main.js runs LAST (init).
  To run a personal plan with your own numbers, copy this file, add a
  <script src="js/seed-taylor.js"></script> line BEFORE js/state.js, and the seed's
  SEED_STATE/SEED_KEY override the generic demo. See README -> "Personal seed".
  Classic <script src>/<link> load over file:// AND GitHub Pages, so no bundler is needed.
-->
<title>Household Cashflow &amp; Funding Plan</title>
<link rel="stylesheet" href="styles.css">
<body>
<script src="js/layout.js"></script>
<script src="js/state.js"></script>
<script src="js/util.js"></script>
<script src="js/simulate.js"></script>
<script src="js/header.js"></script>
<script src="js/sankey.js"></script>
<script src="js/gantt.js"></script>
<script src="js/debts.js"></script>
<script src="js/projection.js"></script>
<script src="js/freedom.js"></script>
<script src="js/render.js"></script>
<script src="js/setup.js"></script>
<script src="js/main.js"></script>
</body>
